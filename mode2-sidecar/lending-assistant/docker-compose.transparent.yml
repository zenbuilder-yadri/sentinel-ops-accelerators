###############################################################################
# Mode 2 — TRANSPARENT iptables interception (the primary, non-cooperative path)
#
# Unlike docker-compose.yml (which uses HTTP_PROXY env steering), here the agent
# has NO proxy env at all. An iptables-init container shares the agent's network
# namespace and REDIRECTs all :80/:443 egress to the sidecar — so interception
# happens even though the agent is completely unaware of any proxy. This mirrors
# a Kubernetes pod: app + sidecar + init share one netns.
#
#   lending-agent (no HTTP_PROXY)  ──:443──▶ [iptables REDIRECT] ──▶ soe-sidecar:15001
#                                                                         │ allow/deny
#                                                                         ▼ (uid 1337, not redirected)
#                                                                    real destination
#
# Run:   docker compose -f docker-compose.transparent.yml up --build -d
# Prove: tests/iptables-interception-test.sh
###############################################################################

services:

  # Owns the shared network namespace. NO proxy env — egress is steered by iptables.
  lending-agent:
    build: { context: ./app }
    image: lending-assistant:local
    container_name: lending-agent
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BUREAU_URL: http://mock-bureau:9000
      LOS_URL: http://mock-los:9000
      MAIL_URL: http://mock-mail:9000
      PYTHONUNBUFFERED: "1"
      # NOTE: deliberately NO HTTP_PROXY/HTTPS_PROXY here. Interception is iptables-only.
    ports: ["8090:8090"]
    networks: [lendnet]

  # Shares the agent's netns; listens on :15001 there. Runs as uid 1337 (excluded
  # from REDIRECT) so its forwarded egress is not looped back.
  soe-sidecar:
    image: ${SOE_SIDECAR_IMAGE:-us-central1-docker.pkg.dev/pragmatic-braid-467912-u0/sentinel-ops/soe-sidecar:latest}
    container_name: lending-sidecar
    network_mode: "service:lending-agent"
    env_file: [{ path: .env, required: false }]
    environment:
      SOE_AGENT_ID: ${SOE_APP_ID:-lending-assistant-mode2}
      SOE_TENANT_ID: ${SOE_TENANT_ID}
      SOE_API_TOKEN: ${SOE_API_TOKEN:-}
      SOE_API_KEY: ${SOE_API_KEY:-}
      SOE_API_URL: ${SOE_API_URL:-https://api.yadriworks.ai}
      SOE_MODE: enforce
      SOE_PROXY_PORT: "15001"
      SOE_HEALTH_PORT: "3101"
      SOE_TRANSPARENT: "true"
      SOE_CIRCUIT_BREAKER_FAIL_MODE: ${SOE_CIRCUIT_BREAKER_FAIL_MODE:-closed}
      SOE_DEFINITIONS_DIR: /etc/soe/definitions
    volumes:
      - ./soe-definitions:/etc/soe/definitions:ro
    depends_on: [lending-agent]

  # Sets the iptables REDIRECT rules in the shared netns, then exits. Rules persist.
  iptables-init:
    image: alpine:3.20
    container_name: lending-iptables-init
    network_mode: "service:lending-agent"
    cap_add: ["NET_ADMIN"]
    environment:
      SIDECAR_PORT: "15001"
      SIDECAR_UID: "1337"
    volumes:
      - ./iptables-init:/init:ro
    command: ["/bin/sh", "/init/init.sh"]
    depends_on: [lending-agent]

  mock-bureau: { build: { context: ./mock-services }, container_name: lending-mock-bureau, networks: [lendnet] }
  mock-los:    { build: { context: ./mock-services }, container_name: lending-mock-los,    networks: [lendnet] }
  mock-mail:   { build: { context: ./mock-services }, container_name: lending-mock-mail,   networks: [lendnet] }

networks:
  lendnet: { driver: bridge }

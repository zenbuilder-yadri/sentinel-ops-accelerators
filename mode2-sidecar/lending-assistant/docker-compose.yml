###############################################################################
# Mode 2 — LendingAssistant (transparent sidecar containment)
#
#   lending-agent ──HTTP_PROXY──▶ soe-sidecar:15001 ──/v1/evaluate──▶ control plane
#   (vanilla LangGraph)          (public image)        (api.yadriworks.ai)
#                                      │
#         allow-listed egress ────────┼────▶ api.anthropic.com (LLM)
#                                      ├────▶ mock-bureau / mock-los / mock-mail
#                                      └──X── attacker.example / 169.254.169.254 / pastebin  (DENIED)
#
# Run:    docker compose up --build -d
# Test:   python scenarios/attack.py
# Stop:   docker compose down -v
###############################################################################

services:

  soe-sidecar:
    image: public.ecr.aws/k6j2y7z0/sentinel-ops/soe-sidecar:latest
    container_name: lending-sidecar
    env_file:
      - path: .env
        required: false
    environment:
      SOE_AGENT_ID: ${SOE_APP_ID:-lending-assistant-mode2}
      SOE_TENANT_ID: ${SOE_TENANT_ID}
      SOE_API_KEY: ${SOE_API_KEY}
      SOE_API_URL: ${SOE_API_URL:-https://api.yadriworks.ai}
      SOE_AUTH_MODE: api-key
      SOE_MODE: enforce
      SOE_PROXY_PORT: "15001"
      SOE_HEALTH_PORT: "3101"
      SOE_LOG_LEVEL: info
      SOE_CIRCUIT_BREAKER_FAIL_MODE: ${SOE_CIRCUIT_BREAKER_FAIL_MODE:-closed}
      SOE_DEFINITIONS_DIR: /etc/soe/definitions
    volumes:
      - ./soe-definitions:/etc/soe/definitions:ro
    ports:
      - "15001:15001"
      - "3101:3101"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3101/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [lendnet]

  lending-agent:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lending-agent
    environment:
      # The ONLY governance wiring — one env-var. No SDK, no code change.
      HTTP_PROXY: http://soe-sidecar:15001
      HTTPS_PROXY: http://soe-sidecar:15001
      NO_PROXY: localhost,127.0.0.1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BUREAU_URL: http://mock-bureau:9000
      LOS_URL: http://mock-los:9000
      MAIL_URL: http://mock-mail:9000
      PYTHONUNBUFFERED: "1"
    depends_on:
      soe-sidecar:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks: [lendnet]

  mock-bureau:
    build: { context: ./mock-services }
    container_name: lending-mock-bureau
    networks: [lendnet]

  mock-los:
    build: { context: ./mock-services }
    container_name: lending-mock-los
    networks: [lendnet]

  mock-mail:
    build: { context: ./mock-services }
    container_name: lending-mock-mail
    networks: [lendnet]

networks:
  lendnet:
    driver: bridge
